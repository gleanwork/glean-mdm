name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Build binaries for all platforms
        env:
          MDM_VERSION: ${{ github.ref_name }}
        run: ./build.sh

      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/glean-mdm-*
            dist/version.json
