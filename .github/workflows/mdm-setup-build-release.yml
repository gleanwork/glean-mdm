name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"

      - name: Build binaries for all platforms
        env:
          MDM_VERSION: ${{ github.ref_name }}
        run: ./build.sh

      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/glean-mdm-*
            dist/version.json
