name: CI

on:
  pull_request:
    branches: [main]

env:
  GO_VERSION: "1.26"

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - run: go vet ./...

      - run: go test ./...

  registry-snapshot:
    # Ensures internal/registry/registry.json is in sync with the pinned
    # @gleanwork/mcp-config-schema version (the source of truth).
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Regenerate registry snapshot
        working-directory: scripts
        run: |
          npm install
          npm run generate

      - name: Verify registry snapshot is up to date
        run: |
          if ! git diff --exit-code internal/registry/registry.json; then
            echo "registry.json is stale. Run 'npm run generate' in scripts/ and commit the result."
            exit 1
          fi

  e2e-update:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            ext: ""
          - os: macos-latest
            ext: ""
          - os: windows-2025-vs2026
            ext: ".exe"
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v6
        with:
          path: pr

      - uses: actions/checkout@v6
        with:
          ref: main
          path: main

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Build old binary
        run: |
          # Build the "old" binary from main. During the migration PR, main is
          # still the pre-Go tree (no go.mod); fall back to PR sources so the
          # update mechanism is still exercised. Post-merge, main is Go.
          if [ -f main/go.mod ]; then
            SRC=main
          else
            echo "main has no go.mod (pre-migration); building old binary from PR sources"
            SRC=pr
          fi
          ( cd "$SRC" && CGO_ENABLED=0 go build \
            -ldflags "-X github.com/gleanwork/glean-mdm/internal/version.BuildVersion=0.1.0" \
            -o "$GITHUB_WORKSPACE/glean-mdm-old${{ matrix.ext }}" ./cmd/glean-mdm )

      - name: Build new binary (PR)
        working-directory: pr
        run: |
          CGO_ENABLED=0 go build \
            -ldflags "-X github.com/gleanwork/glean-mdm/internal/version.BuildVersion=99.0.0" \
            -o "$GITHUB_WORKSPACE/glean-mdm-new${{ matrix.ext }}" ./cmd/glean-mdm

      - name: Run E2E update test
        run: |
          pr/ci/e2e-update-test.sh \
            "$GITHUB_WORKSPACE/glean-mdm-old${{ matrix.ext }}" \
            "$GITHUB_WORKSPACE/glean-mdm-new${{ matrix.ext }}"

  e2e-error-handling:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            ext: ""
          - os: macos-latest
            ext: ""
          - os: windows-2025-vs2026
            ext: ".exe"
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
      - name: Build binary
        run: |
          CGO_ENABLED=0 go build \
            -ldflags "-X github.com/gleanwork/glean-mdm/internal/version.BuildVersion=0.1.0" \
            -o dist/glean-mdm${{ matrix.ext }} ./cmd/glean-mdm
      - name: Run E2E error handling test
        run: ci/e2e-error-test.sh dist/glean-mdm${{ matrix.ext }}

  e2e-config:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            ext: ""
          - os: macos-latest
            ext: ""
          - os: windows-2025-vs2026
            ext: ".exe"
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
      - name: Build binary
        run: |
          CGO_ENABLED=0 go build \
            -ldflags "-X github.com/gleanwork/glean-mdm/internal/version.BuildVersion=0.1.0" \
            -o dist/glean-mdm${{ matrix.ext }} ./cmd/glean-mdm
      - name: Run E2E config creation test
        run: ci/e2e-config-test.sh dist/glean-mdm${{ matrix.ext }}

  e2e-schedule:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            ext: ""
          - os: macos-latest
            ext: ""
          - os: windows-2025-vs2026
            ext: ".exe"
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
      - name: Build binary
        run: |
          CGO_ENABLED=0 go build \
            -ldflags "-X github.com/gleanwork/glean-mdm/internal/version.BuildVersion=0.1.0" \
            -o dist/glean-mdm${{ matrix.ext }} ./cmd/glean-mdm
      - name: Run E2E schedule test
        run: ci/e2e-schedule-test.sh dist/glean-mdm${{ matrix.ext }}

  e2e-uninstall:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            ext: ""
          - os: macos-latest
            ext: ""
          - os: windows-2025-vs2026
            ext: ".exe"
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
      - name: Build binary
        run: |
          CGO_ENABLED=0 go build \
            -ldflags "-X github.com/gleanwork/glean-mdm/internal/version.BuildVersion=0.1.0" \
            -o dist/glean-mdm${{ matrix.ext }} ./cmd/glean-mdm
      - name: Run E2E uninstall test
        run: ci/e2e-uninstall-test.sh dist/glean-mdm${{ matrix.ext }}
