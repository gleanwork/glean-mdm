name: CI

on:
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - run: bun install

      - run: bunx vitest run

  release-artifacts:
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13

      - name: Verify Bun version pin
        run: |
          expected="$(python3 -c 'import tomllib; print(tomllib.load(open("mise.toml", "rb"))["tools"]["bun"])')"
          actual="$(bun --version)"
          if [ "$actual" != "$expected" ]; then
            echo "Expected Bun $expected from mise.toml, got $actual"
            exit 1
          fi

      - run: bun install

      - name: Build release artifacts
        env:
          MDM_VERSION: v0.0.0-ci
          REQUIRE_DARWIN_CODESIGN: "1"
        run: ./build.sh

      - name: Verify macOS codesign compatibility and release artifacts
        run: ci/verify-release-artifacts.sh dist v0.0.0-ci

  e2e-update:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: bun-linux-x64
            ext: ""
          - os: macos-latest
            target: bun-darwin-arm64
            ext: ""
          - os: windows-2025-vs2026
            target: bun-windows-x64
            ext: ".exe"
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v6
        with:
          path: pr

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies (PR)
        run: bun install
        working-directory: pr

      - name: Download latest released binary
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          asset_target="${{ matrix.target }}"
          asset_target="${asset_target#bun-}"
          asset="glean-mdm-${asset_target}${{ matrix.ext }}"
          echo "Downloading latest release asset: ${asset}"

          gh release download \
            --repo "$GITHUB_REPOSITORY" \
            --pattern "$asset" \
            --output "$GITHUB_WORKSPACE/glean-mdm-old${{ matrix.ext }}" \
            --clobber
          chmod 755 "$GITHUB_WORKSPACE/glean-mdm-old${{ matrix.ext }}"

      - name: Build new binary (PR)
        run: |
          bun build src/index.ts \
            --compile \
            --target=${{ matrix.target }} \
            --define "process.env.BUILD_VERSION=\"99.0.0\"" \
            --outfile dist/glean-mdm-new${{ matrix.ext }}
        working-directory: pr

      - name: Run E2E update test
        run: |
          pr/ci/e2e-update-test.sh \
            "$GITHUB_WORKSPACE/glean-mdm-old${{ matrix.ext }}" \
            pr/dist/glean-mdm-new${{ matrix.ext }}

  e2e-error-handling:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: bun-linux-x64
            ext: ""
          - os: macos-latest
            target: bun-darwin-arm64
            ext: ""
          - os: windows-2025-vs2026
            target: bun-windows-x64
            ext: ".exe"
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install
      - name: Build binary
        run: |
          bun build src/index.ts \
            --compile \
            --target=${{ matrix.target }} \
            --define "process.env.BUILD_VERSION=\"0.1.0\"" \
            --outfile dist/glean-mdm${{ matrix.ext }}
      - name: Run E2E error handling test
        run: ci/e2e-error-test.sh dist/glean-mdm${{ matrix.ext }}

  e2e-config:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: bun-linux-x64
            ext: ""
          - os: macos-latest
            target: bun-darwin-arm64
            ext: ""
          - os: windows-2025-vs2026
            target: bun-windows-x64
            ext: ".exe"
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install
      - name: Build binary
        run: |
          bun build src/index.ts \
            --compile \
            --target=${{ matrix.target }} \
            --define "process.env.BUILD_VERSION=\"0.1.0\"" \
            --outfile dist/glean-mdm${{ matrix.ext }}
      - name: Run E2E config creation test
        run: ci/e2e-config-test.sh dist/glean-mdm${{ matrix.ext }}

  e2e-schedule:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: bun-linux-x64
            ext: ""
          - os: macos-latest
            target: bun-darwin-arm64
            ext: ""
          - os: windows-2025-vs2026
            target: bun-windows-x64
            ext: ".exe"
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install
      - name: Build binary
        run: |
          bun build src/index.ts \
            --compile \
            --target=${{ matrix.target }} \
            --define "process.env.BUILD_VERSION=\"0.1.0\"" \
            --outfile dist/glean-mdm${{ matrix.ext }}
      - name: Run E2E schedule test
        run: ci/e2e-schedule-test.sh dist/glean-mdm${{ matrix.ext }}

  e2e-uninstall:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: bun-linux-x64
            ext: ""
          - os: macos-latest
            target: bun-darwin-arm64
            ext: ""
          - os: windows-2025-vs2026
            target: bun-windows-x64
            ext: ".exe"
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install
      - name: Build binary
        run: |
          bun build src/index.ts \
            --compile \
            --target=${{ matrix.target }} \
            --define "process.env.BUILD_VERSION=\"0.1.0\"" \
            --outfile dist/glean-mdm${{ matrix.ext }}
      - name: Run E2E uninstall test
        run: ci/e2e-uninstall-test.sh dist/glean-mdm${{ matrix.ext }}
