name: CI

on:
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - run: bun install

      - run: bunx vitest run

  e2e-update:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: bun-linux-x64
            ext: ""
          - os: macos-latest
            target: bun-darwin-arm64
            ext: ""
          - os: windows-latest
            target: bun-windows-x64
            ext: ".exe"
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4
        with:
          path: pr

      - uses: actions/checkout@v4
        with:
          ref: main
          path: main

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies (main)
        run: bun install
        working-directory: main

      - name: Install dependencies (PR)
        run: bun install
        working-directory: pr

      - name: Build old binary (main)
        run: |
          bun build src/index.ts \
            --compile \
            --target=${{ matrix.target }} \
            --define "process.env.BUILD_VERSION=\"0.1.0\"" \
            --outfile dist/glean-mdm-old${{ matrix.ext }}
        working-directory: main

      - name: Build new binary (PR)
        run: |
          bun build src/index.ts \
            --compile \
            --target=${{ matrix.target }} \
            --define "process.env.BUILD_VERSION=\"99.0.0\"" \
            --outfile dist/glean-mdm-new${{ matrix.ext }}
        working-directory: pr

      - name: Run E2E update test
        run: pr/ci/e2e-update-test.sh main/dist/glean-mdm-old${{ matrix.ext }} pr/dist/glean-mdm-new${{ matrix.ext }}
