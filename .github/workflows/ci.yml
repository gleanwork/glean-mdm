name: CI

on:
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - run: bun install

      - run: bunx vitest run

  e2e-update:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: bun-linux-x64
            ext: ""
          - os: macos-latest
            target: bun-darwin-arm64
            ext: ""
          - os: windows-latest
            target: bun-windows-x64
            ext: ".exe"
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v6
        with:
          path: pr

      - uses: actions/checkout@v6
        with:
          ref: main
          path: main

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies (main)
        run: bun install
        working-directory: main

      - name: Install dependencies (PR)
        run: bun install
        working-directory: pr

      - name: Build old binary
        run: |
          bun build src/index.ts \
            --compile \
            --target=${{ matrix.target }} \
            --define "process.env.BUILD_VERSION=\"0.1.0\"" \
            --outfile dist/glean-mdm-old${{ matrix.ext }}
        working-directory: main

      - name: Build new binary (PR)
        run: |
          bun build src/index.ts \
            --compile \
            --target=${{ matrix.target }} \
            --define "process.env.BUILD_VERSION=\"99.0.0\"" \
            --outfile dist/glean-mdm-new${{ matrix.ext }}
        working-directory: pr

      - name: Run E2E update test
        run: |
          OLD=main/dist/glean-mdm-old${{ matrix.ext }}
          pr/ci/e2e-update-test.sh "$OLD" pr/dist/glean-mdm-new${{ matrix.ext }}

  e2e-error-handling:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: bun-linux-x64
            ext: ""
          - os: macos-latest
            target: bun-darwin-arm64
            ext: ""
          - os: windows-latest
            target: bun-windows-x64
            ext: ".exe"
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install
      - name: Build binary
        run: |
          bun build src/index.ts \
            --compile \
            --target=${{ matrix.target }} \
            --define "process.env.BUILD_VERSION=\"0.1.0\"" \
            --outfile dist/glean-mdm${{ matrix.ext }}
      - name: Run E2E error handling test
        run: ci/e2e-error-test.sh dist/glean-mdm${{ matrix.ext }}

  e2e-config:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: bun-linux-x64
            ext: ""
          - os: macos-latest
            target: bun-darwin-arm64
            ext: ""
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install
      - name: Build binary
        run: |
          bun build src/index.ts \
            --compile \
            --target=${{ matrix.target }} \
            --define "process.env.BUILD_VERSION=\"0.1.0\"" \
            --outfile dist/glean-mdm${{ matrix.ext }}
      - name: Run E2E config creation test
        run: ci/e2e-config-test.sh dist/glean-mdm${{ matrix.ext }}

  windows-config-ownership:
    runs-on: windows-latest
    env:
      GLEAN_MDM_BINARY: ${{ github.workspace }}\dist\glean-mdm.exe
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install
      - name: Build binary
        run: |
          bun build src/index.ts `
            --compile `
            --target=bun-windows-x64 `
            --define "process.env.BUILD_VERSION=\"0.1.0\"" `
            --outfile dist/glean-mdm.exe
      - name: Run Windows-native ownership integration test
        run: bunx vitest run ci/windows-config-ownership.spec.ts

  e2e-schedule:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: bun-linux-x64
            ext: ""
          - os: macos-latest
            target: bun-darwin-arm64
            ext: ""
          - os: windows-latest
            target: bun-windows-x64
            ext: ".exe"
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install
      - name: Build binary
        run: |
          bun build src/index.ts \
            --compile \
            --target=${{ matrix.target }} \
            --define "process.env.BUILD_VERSION=\"0.1.0\"" \
            --outfile dist/glean-mdm${{ matrix.ext }}
      - name: Run E2E schedule test
        run: ci/e2e-schedule-test.sh dist/glean-mdm${{ matrix.ext }}

  e2e-uninstall:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: bun-linux-x64
            ext: ""
          - os: macos-latest
            target: bun-darwin-arm64
            ext: ""
          - os: windows-latest
            target: bun-windows-x64
            ext: ".exe"
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install
      - name: Build binary
        run: |
          bun build src/index.ts \
            --compile \
            --target=${{ matrix.target }} \
            --define "process.env.BUILD_VERSION=\"0.1.0\"" \
            --outfile dist/glean-mdm${{ matrix.ext }}
      - name: Run E2E uninstall test
        run: ci/e2e-uninstall-test.sh dist/glean-mdm${{ matrix.ext }}
