name: CI

on:
  pull_request:
    branches: [main]

env:
  GO_VERSION: "1.26"

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - run: go vet ./...

      - run: go test ./...

  registry-snapshot:
    # Ensures internal/registry/registry.json is in sync with the pinned
    # @gleanwork/mcp-config-schema version (the source of truth).
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Regenerate registry snapshot
        working-directory: scripts
        run: |
          npm install
          npm run generate

      - name: Verify registry snapshot is up to date
        run: |
          if ! git diff --exit-code internal/registry/registry.json; then
            echo "registry.json is stale. Run 'npm run generate' in scripts/ and commit the result."
            exit 1
          fi

  e2e-update:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            ext: ""
          - os: macos-latest
            ext: ""
          - os: windows-2025-vs2026
            ext: ".exe"
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v6
        with:
          path: pr

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Download latest released binary
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          case "$(uname -s)" in
            Linux) os="linux" ;;
            Darwin) os="darwin" ;;
            MINGW*|MSYS*|CYGWIN*) os="windows" ;;
            *)
              echo "Unsupported platform: $(uname -s)"
              exit 1
              ;;
          esac

          case "$(uname -m)" in
            x86_64|amd64) arch="x64" ;;
            arm64|aarch64) arch="arm64" ;;
            *)
              echo "Unsupported architecture: $(uname -m)"
              exit 1
              ;;
          esac

          ext=""
          [ "$os" = "windows" ] && ext=".exe"
          asset="glean-mdm-${os}-${arch}${ext}"
          echo "Downloading latest release asset: ${asset}"

          gh release download \
            --repo "$GITHUB_REPOSITORY" \
            --pattern "$asset" \
            --output "$GITHUB_WORKSPACE/glean-mdm-old${{ matrix.ext }}" \
            --clobber
          chmod 755 "$GITHUB_WORKSPACE/glean-mdm-old${{ matrix.ext }}"

      - name: Build new binary (PR)
        working-directory: pr
        run: |
          CGO_ENABLED=0 go build \
            -ldflags "-X github.com/gleanwork/glean-mdm/internal/version.BuildVersion=99.0.0" \
            -o "$GITHUB_WORKSPACE/glean-mdm-new${{ matrix.ext }}" ./cmd/glean-mdm

      - name: Run E2E update test
        run: |
          pr/ci/e2e-update-test.sh \
            "$GITHUB_WORKSPACE/glean-mdm-old${{ matrix.ext }}" \
            "$GITHUB_WORKSPACE/glean-mdm-new${{ matrix.ext }}"

  e2e-error-handling:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            ext: ""
          - os: macos-latest
            ext: ""
          - os: windows-2025-vs2026
            ext: ".exe"
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
      - name: Build binary
        run: |
          CGO_ENABLED=0 go build \
            -ldflags "-X github.com/gleanwork/glean-mdm/internal/version.BuildVersion=0.1.0" \
            -o dist/glean-mdm${{ matrix.ext }} ./cmd/glean-mdm
      - name: Run E2E error handling test
        run: ci/e2e-error-test.sh dist/glean-mdm${{ matrix.ext }}

  e2e-config:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            ext: ""
          - os: macos-latest
            ext: ""
          - os: windows-2025-vs2026
            ext: ".exe"
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
      - name: Build binary
        run: |
          CGO_ENABLED=0 go build \
            -ldflags "-X github.com/gleanwork/glean-mdm/internal/version.BuildVersion=0.1.0" \
            -o dist/glean-mdm${{ matrix.ext }} ./cmd/glean-mdm
      - name: Run E2E config creation test
        run: ci/e2e-config-test.sh dist/glean-mdm${{ matrix.ext }}

  e2e-schedule:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            ext: ""
          - os: macos-latest
            ext: ""
          - os: windows-2025-vs2026
            ext: ".exe"
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
      - name: Build binary
        run: |
          CGO_ENABLED=0 go build \
            -ldflags "-X github.com/gleanwork/glean-mdm/internal/version.BuildVersion=0.1.0" \
            -o dist/glean-mdm${{ matrix.ext }} ./cmd/glean-mdm
      - name: Run E2E schedule test
        run: ci/e2e-schedule-test.sh dist/glean-mdm${{ matrix.ext }}

  e2e-uninstall:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            ext: ""
          - os: macos-latest
            ext: ""
          - os: windows-2025-vs2026
            ext: ".exe"
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
      - name: Build binary
        run: |
          CGO_ENABLED=0 go build \
            -ldflags "-X github.com/gleanwork/glean-mdm/internal/version.BuildVersion=0.1.0" \
            -o dist/glean-mdm${{ matrix.ext }} ./cmd/glean-mdm
      - name: Run E2E uninstall test
        run: ci/e2e-uninstall-test.sh dist/glean-mdm${{ matrix.ext }}
